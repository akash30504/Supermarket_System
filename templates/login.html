<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign In — SuperMart</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Merriweather:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lato',sans-serif;background:#f0f3f7;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.page{display:flex;width:100%;max-width:920px;min-height:520px;box-shadow:0 4px 32px rgba(0,0,0,0.13);border-radius:10px;overflow:hidden;}

/* LEFT PANEL — centered brand name only */
.left{background:#1a5276;flex:1;padding:48px 40px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.brand-name{font-family:'Merriweather',serif;font-size:44px;font-weight:700;color:#fff;text-align:center;line-height:1.2;}
.brand-name span{color:#f0b429;}
.brand-sub{font-size:13px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:2px;margin-top:12px;text-align:center;}

/* RIGHT PANEL */
.right{background:#fff;width:380px;flex-shrink:0;padding:44px 40px;display:flex;flex-direction:column;justify-content:center;}
.login-title{font-family:'Merriweather',serif;font-size:20px;font-weight:700;color:#1c2833;margin-bottom:4px;}
.login-sub{font-size:13px;color:#8a9ab0;margin-bottom:28px;}

.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:700;color:#4a5568;margin-bottom:5px;}
.form-control{width:100%;padding:9px 13px;border:1px solid #b2bec3;border-radius:6px;font-family:'Lato',sans-serif;font-size:14px;color:#1c2833;transition:border-color 0.15s,box-shadow 0.15s;}
.form-control:focus{outline:none;border-color:#1a5276;box-shadow:0 0 0 3px rgba(26,82,118,0.1);}
.btn-login{width:100%;padding:11px;background:#1a5276;color:#fff;border:none;border-radius:6px;font-family:'Lato',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:background 0.15s;margin-top:6px;}
.btn-login:hover{background:#154360;}

.flash{padding:9px 13px;border-radius:6px;font-size:13px;margin-bottom:16px;background:#fadbd8;border:1px solid #f1948a;color:#c0392b;display:flex;align-items:center;gap:8px;}

.creds{margin-top:24px;padding:14px 16px;background:#f8f9fa;border:1px solid #dce1e7;border-radius:6px;}
.creds-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#8a9ab0;margin-bottom:8px;}
.cred-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12.5px;}
.cred-row span:first-child{color:#1c2833;font-weight:700;}
.cred-row span:last-child{color:#1a5276;font-family:monospace;}
</style>
</head>
<body>
<div class="page">

  <!-- LEFT — brand name only, centered -->
  <div class="left">
    <div class="brand-name">Super<span>Mart</span></div>
    <div class="brand-sub">Secure Management System</div>
  </div>

  <!-- RIGHT — login form -->
  <div class="right">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your account to continue</div>

    {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="flash">✖ {{ msg }}</div>
    {% endfor %}

    <form method="POST" action="{{ url_for('login_page') }}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" placeholder="Enter your username" autofocus required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="Enter your password" required/>
      </div>
      <button class="btn-login" type="submit">Sign In</button>
    </form>

    <div class="creds">
      <div class="creds-title">Demo Credentials</div>
      <div class="cred-row"><span>admin</span><span>Admin@123</span></div>
      <div class="cred-row"><span>manager</span><span>Manager@123</span></div>
      <div class="cred-row"><span>cashier1</span><span>Cashier@123</span></div>
    </div>
  </div>

</div>
</body>
</html>
