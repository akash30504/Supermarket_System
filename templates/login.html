<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — SuperMart</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0c10;--card:#111318;--border:#1e2330;
  --accent:#00e5a0;--danger:#ff3b5c;--text:#e8eaf0;--muted:#6b7280;
}
body{
  font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
/* Grid background */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,229,160,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,160,0.04) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}
.glow{
  position:fixed;top:-200px;left:50%;transform:translateX(-50%);
  width:600px;height:400px;
  background:radial-gradient(ellipse,rgba(0,229,160,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.login-box{
  width:100%;max-width:400px;padding:20px;position:relative;z-index:1;
}
.login-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:40px;
}
.brand{text-align:center;margin-bottom:32px;}
.brand-name{
  font-family:'Syne',sans-serif;font-weight:800;font-size:28px;
  color:var(--accent);letter-spacing:-1px;
}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}

.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.form-control{
  width:100%;padding:12px 16px;
  background:#0a0c10;border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;
  transition:border-color 0.15s;
}
.form-control:focus{outline:none;border-color:var(--accent);}

.btn-login{
  width:100%;padding:13px;background:var(--accent);color:#000;
  border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;
  font-size:14px;cursor:pointer;transition:background 0.15s;margin-top:8px;
  letter-spacing:0.5px;
}
.btn-login:hover{background:#00cc8a;}

.flash{
  padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:16px;
  background:rgba(255,59,92,0.1);border:1px solid rgba(255,59,92,0.3);color:var(--danger);
  display:flex;align-items:center;gap:8px;
}
.creds{
  margin-top:24px;padding:16px;background:rgba(0,229,160,0.05);
  border:1px solid rgba(0,229,160,0.15);border-radius:8px;font-size:11px;
}
.creds-title{color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-size:9px;}
.cred-row{display:flex;justify-content:space-between;padding:3px 0;color:var(--muted);}
.cred-row span:first-child{color:var(--text);}
.cred-row span:last-child{color:var(--accent);}
</style>
</head>
<body>
<div class="glow"></div>
<div class="login-box">
  <div class="login-card">
    <div class="brand">
      <div class="brand-name">SuperMart</div>
      <div class="brand-sub">Secure Management System</div>
    </div>

    {% for cat, msg in get_flashed_messages(with_categories=true) %}
    <div class="flash">✘ {{ msg }}</div>
    {% endfor %}

    <form method="POST" action="{{ url_for('login_page') }}">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" placeholder="Enter username" autofocus required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="Enter password" required/>
      </div>
      <button class="btn-login" type="submit">Sign In →</button>
    </form>

    <div class="creds">
      <div class="creds-title">Default Credentials</div>
      <div class="cred-row"><span>admin</span><span>Admin@123</span></div>
      <div class="cred-row"><span>manager</span><span>Manager@123</span></div>
      <div class="cred-row"><span>cashier1</span><span>Cashier@123</span></div>
    </div>
  </div>
</div>
</body>
</html>
